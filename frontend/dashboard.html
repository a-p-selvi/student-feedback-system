<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link rel="stylesheet" href="css/sty.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h3>🎓 jp College of Arts and Science</h3>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>
</div>

<div class="container">

    <h2>Student Feedback Dashboard Overview</h2>

    <!-- STATS -->
    <div class="stats">
      <div class="card-box">📢 Announcements <span>300</span></div>
<div class="card-box">💬 Reviews Posted <span>120</span></div>
<div class="card-box">🏆 Events Conducted <span>30+</span></div>

    </div>

    <h2>Student Feedback Form</h2>

    <form id="studentForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Register Number</label>
            <input type="text" id="registerNumber" required>
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" id="department" required>
        </div>

        <div class="form-group">
            <label>Year of Study</label>
            <select id="year">
                <option>1st Year</option>
                <option>2nd Year</option>
                <option>3rd Year</option>
               
            </select>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select id="gender">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea id="address" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label>Feedback / Suggestions</label>
            <textarea id="feedback" rows="5"></textarea>
        </div>

        <button type="submit" class="submit-btn">
            Submit Feedback
        </button>

    </form>

    <!-- RECENT FEEDBACK -->
    <div class="feedback-list">
        <h3>Recent Feedback</h3>
        <div class="item">📩 John - Good College</div>
        <div class="item">📩 Sara - Need more labs</div>
        <div class="item">📩 Ravi - Improve WiFi speed</div>
    </div>

</div>

<script>
function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    alert("Logged out successfully!");
    window.location.href = "/login.html";
}

document.getElementById("studentForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        fullName: document.getElementById("fullName").value,
        email: document.getElementById("email").value,
        registerNumber: document.getElementById("registerNumber").value,
        department: document.getElementById("department").value,
        year: document.getElementById("year").value,
        gender: document.getElementById("gender").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        feedback: document.getElementById("feedback").value
    };

    try {
        const res = await fetch("/api/feedback", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if(res.ok){
            alert("Feedback Saved Successfully!");
            document.getElementById("studentForm").reset();
        } else {
            alert("Failed!");
        }

    } catch(err){
        alert("Server Error!");
    }
});
</script>

</body>
</html>
